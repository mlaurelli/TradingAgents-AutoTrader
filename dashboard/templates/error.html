<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TradingAgents - Errore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="glass-morphism rounded-2xl shadow-2xl p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-500 rounded-full mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            
            <h1 class="text-2xl font-bold text-white mb-2">Errore</h1>
            <p class="text-purple-100 mb-6">{{ message }}</p>
            
            <div class="space-y-3">
                <a href="/dashboard" class="block w-full bg-white text-purple-600 font-semibold py-3 px-4 rounded-lg hover:bg-opacity-90 transition-all duration-200">
                    Riprova
                </a>
                <a href="/logout" class="block w-full bg-red-500 bg-opacity-20 text-white font-semibold py-3 px-4 rounded-lg hover:bg-opacity-30 transition-all duration-200">
                    Logout
                </a>
            </div>
        </div>
    </div>
</body>
</html>
